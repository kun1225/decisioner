name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: joygym
          POSTGRES_PASSWORD: joygym
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U joygym -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: 'postgresql://joygym:joygym@localhost:5432/joygym_test'
      ACCESS_TOKEN_SECRET: 'test-access-token-secret'
      REFRESH_TOKEN_SECRET: 'test-refresh-token-secret'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Check format
        run: pnpm run check-format

      - name: Lint
        run: pnpm run lint

      - name: Check types
        run: pnpm run check-types

      - name: Test
        run: pnpm run test
